apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: tls-tap
  labels:
    app.kubernetes.io/name: tls-tap
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: tls-tap
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tls-tap
    spec:
      hostPID: {{ .Values.hostPID }}
      # The TLS-uprobe attach must happen before pods we want to
      # observe come up; otherwise we miss the first burst of
      # connections. system-node-critical sequences us early in the
      # boot order alongside CNI / runtime DaemonSets.
      priorityClassName: system-node-critical
      containers:
        - name: tls-tap
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- range (splitList "," .Values.attachPids) }}
            {{- if . }}
            - "--pid={{ . }}"
            {{- end }}
            {{- end }}
            - "--max-print-bytes={{ .Values.maxPrintBytes }}"
            {{- if .Values.utf8 }}
            - "--utf8"
            {{- end }}
          securityContext:
            privileged: {{ .Values.privileged }}
            capabilities:
              add:
                # CAP_BPF: load eBPF programs.
                # CAP_SYS_PTRACE: read /proc/<pid>/maps of other processes.
                # CAP_PERFMON: required by uprobe attach on 5.8+.
                - BPF
                - SYS_PTRACE
                - PERFMON
                - SYS_ADMIN
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
