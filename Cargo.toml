[workspace]
resolver = "2"
members = [
    "agent-gateway-enforcer",
    "agent-gateway-enforcer-common",
    "xtask",
]

# Root package for integration tests
[package]
name = "agent-gateway-enforcer-tests"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
agent-gateway-enforcer-common = { path = "agent-gateway-enforcer-common" }
libc = "0.2"

[target.'cfg(target_os = "linux")'.dependencies]
agent-gateway-enforcer-common = { path = "agent-gateway-enforcer-common", features = ["user"] }
aya = { version = "0.12", features = ["async_tokio"] }

[[test]]
name = "integration_test"
path = "tests/integration_test.rs"

[workspace.dependencies]
aya = { version = "0.12", features = ["async_tokio"] }
aya-log = "0.2"
clap = { version = "4.4", features = ["derive"] }
tokio = { version = "1.35", features = ["full"] }
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
axum = "0.7"
prometheus = "0.13"

[profile.dev]
opt-level = 3
debug = false
overflow-checks = false
lto = true
panic = "abort"

[profile.release]
lto = true
panic = "abort"
