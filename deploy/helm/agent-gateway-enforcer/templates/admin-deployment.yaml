{{- if .Values.admin.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agents-enforcer.fullname" . }}-admin
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "agents-enforcer.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  replicas: {{ .Values.admin.replicaCount }}
  selector:
    matchLabels:
      {{- include "agents-enforcer.labels" . | nindent 6 }}
      app.kubernetes.io/component: admin
  template:
    metadata:
      labels:
        {{- include "agents-enforcer.labels" . | nindent 8 }}
        app.kubernetes.io/component: admin
      {{- with .Values.admin.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "agents-enforcer.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: admin
          image: "{{ .Values.admin.image.repository }}:{{ .Values.admin.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.admin.image.pullPolicy }}
          args:
            - --listen=0.0.0.0:{{ .Values.admin.listenPort }}
          env:
            - name: RUST_LOG
              value: info
            {{- if .Values.admin.promUrl }}
            - name: ENFORCER_PROM_URL
              value: {{ .Values.admin.promUrl | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.admin.listenPort }}
              protocol: TCP
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 30
          resources:
            {{- toYaml .Values.admin.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      {{- with .Values.admin.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agents-enforcer.fullname" . }}-admin
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "agents-enforcer.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  type: ClusterIP
  selector:
    {{- include "agents-enforcer.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
  ports:
    - name: http
      port: 80
      targetPort: http
{{- if .Values.admin.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "agents-enforcer.fullname" . }}-admin
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "agents-enforcer.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
  {{- with .Values.admin.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.admin.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.admin.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.admin.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "agents-enforcer.fullname" . }}-admin
                port:
                  number: 80
{{- end }}
{{- end }}
