{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-gateway-enforcer.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-gateway-enforcer.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for DaemonSet
  ports:
    - port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "agent-gateway-enforcer.selectorLabels" . | nindent 4 }}
{{- end }}
