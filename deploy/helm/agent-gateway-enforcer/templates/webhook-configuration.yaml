{{- if .Values.webhook.enabled -}}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "agents-enforcer.fullname" . }}
  labels:
    {{- include "agents-enforcer.labels" . | nindent 4 }}
  {{- if .Values.webhook.certManager.enabled }}
  annotations:
    # cert-manager injects the caBundle into every ClientConfig on
    # this resource, so rotations don't require a re-apply.
    cert-manager.io/inject-ca-from: "{{ .Values.namespace }}/{{ include "agents-enforcer.fullname" . }}-webhook"
  {{- end }}
webhooks:
  - name: validate.agentpolicies.agents.enforcer.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    timeoutSeconds: {{ .Values.webhook.timeoutSeconds }}
    clientConfig:
      service:
        name: {{ include "agents-enforcer.fullname" . }}-webhook
        namespace: {{ .Values.namespace }}
        path: /validate
        port: 443
    rules:
      - apiGroups:   ["agents.enforcer.io"]
        apiVersions: ["v1alpha1"]
        operations:  ["CREATE", "UPDATE"]
        resources:   ["agentpolicies"]
        scope:       Namespaced
{{- end }}
