{{- if .Values.webhook.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agents-enforcer.fullname" . }}-webhook
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "agents-enforcer.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  type: ClusterIP
  selector:
    {{- include "agents-enforcer.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
  ports:
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
{{- end }}
