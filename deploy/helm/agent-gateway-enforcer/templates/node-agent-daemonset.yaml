apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "agents-enforcer.nodeAgent.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "agents-enforcer.labels" . | nindent 4 }}
    app.kubernetes.io/component: node-agent
spec:
  selector:
    matchLabels:
      {{- include "agents-enforcer.labels" . | nindent 6 }}
      app.kubernetes.io/component: node-agent
  updateStrategy:
    # eBPF programs are re-attached on start; rolling a pod at a
    # time keeps coverage at N-1 during the upgrade.
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        {{- include "agents-enforcer.labels" . | nindent 8 }}
        app.kubernetes.io/component: node-agent
      {{- with .Values.nodeAgent.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "agents-enforcer.serviceAccountName" . }}
      hostPID: {{ .Values.nodeAgent.hostPID }}
      hostNetwork: {{ .Values.nodeAgent.hostNetwork }}
      # Prevents eviction on node pressure; without this, a node under
      # memory stress loses enforcement before it loses anything else.
      priorityClassName: system-node-critical
      containers:
        - name: node-agent
          image: "{{ .Values.nodeAgent.image.repository }}:{{ .Values.nodeAgent.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.nodeAgent.image.pullPolicy }}
          args:
            - "--listen=0.0.0.0:{{ .Values.nodeAgent.grpc.port }}"
          env:
            - name: RUST_LOG
              value: info
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            {{- if .Values.nodeAgent.reporter.enabled }}
            # When set, the node-agent POSTs decision events
            # (cgroup/connect blocks, LSM denials) to the controller's
            # ingest endpoint so they surface as AgentViolation CRs.
            - name: ENFORCER_EVENTS_URL
              value: "{{ .Values.nodeAgent.reporter.controllerUrl | default (printf "http://%s.%s.svc:%d/events/batch" (include "agents-enforcer.controller.fullname" .) .Release.Namespace (int .Values.controller.events.port)) }}"
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.nodeAgent.grpc.port }}
              protocol: TCP
          securityContext:
            privileged: {{ .Values.nodeAgent.privileged }}
            capabilities:
              add:
                # Minimum set; drop `privileged: true` once the kernel
                # caps are stable across target distributions.
                - BPF
                - PERFMON
                - SYS_ADMIN
                - NET_ADMIN
          resources:
            {{- toYaml .Values.nodeAgent.resources | nindent 12 }}
          volumeMounts:
            - name: sys-fs-bpf
              mountPath: /sys/fs/bpf
              mountPropagation: Bidirectional
            - name: sys-fs-cgroup
              mountPath: /sys/fs/cgroup
              readOnly: false
      volumes:
        - name: sys-fs-bpf
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: sys-fs-cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
      {{- with .Values.nodeAgent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeAgent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
