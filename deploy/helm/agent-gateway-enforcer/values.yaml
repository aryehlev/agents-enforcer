# Default values for agent-gateway-enforcer

# Image configuration
image:
  repository: ghcr.io/aryehlev/agents-enforcer
  tag: ""  # Defaults to Chart appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Gateway configuration - REQUIRED
# List of allowed gateway addresses in IP:PORT format
gateways:
  - "10.0.0.1:8080"

# Cgroup path to attach to
# Common values:
#   /sys/fs/cgroup                    - All processes (use with caution)
#   /sys/fs/cgroup/system.slice       - All systemd services
#   /sys/fs/cgroup/user.slice         - All user processes
cgroup: "/sys/fs/cgroup"

# File access enforcement configuration
fileEnforcement:
  # Enable file access control via LSM BPF
  enabled: false

  # Default policy: false = allow all (blocklist mode), true = deny all (allowlist mode)
  defaultDeny: false

  # Paths to explicitly allow (used in defaultDeny: true mode)
  allowPaths: []
  #   - /tmp
  #   - /app/workspace
  #   - /var/log/agent

  # Paths to explicitly deny (used in defaultDeny: false mode)
  denyPaths:
    - /etc/shadow
    - /etc/passwd
    - /root
    - /home

# Metrics configuration
metrics:
  # Enable Prometheus metrics endpoint
  enabled: true
  port: 9090

  # ServiceMonitor for Prometheus Operator
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    #   release: prometheus

# Pod configuration
podAnnotations: {}

podLabels: {}

# Security context for the pod
podSecurityContext: {}

# Security context for the container
# Note: privileged is required for eBPF
securityContext:
  privileged: true
  # Alternative: use specific capabilities (requires kernel support)
  # privileged: false
  # capabilities:
  #   add:
  #     - SYS_ADMIN
  #     - BPF
  #     - NET_ADMIN
  #     - PERFMON

# Resource limits
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Node selector - ensure Linux nodes
nodeSelector:
  kubernetes.io/os: linux

# Tolerations for running on all nodes (including masters)
tolerations:
  - operator: Exists
    effect: NoSchedule
  - operator: Exists
    effect: NoExecute

# Affinity rules
affinity: {}

# Service account configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""

# RBAC configuration
rbac:
  create: true

# Logging configuration
logging:
  level: info  # trace, debug, info, warn, error

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /health
    port: metrics
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: metrics
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Extra environment variables
extraEnv: []
#   - name: RUST_LOG
#     value: debug

# Extra volume mounts (in addition to required cgroup/bpf mounts)
extraVolumeMounts: []

# Extra volumes
extraVolumes: []
