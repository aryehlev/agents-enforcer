# agents-enforcer Helm values.
#
# Two workloads: `controller` runs one Deployment on the control plane,
# `nodeAgent` runs as a DaemonSet on every Linux node. They talk over
# gRPC on nodeAgent.grpc.port.

nameOverride: ""
fullnameOverride: ""

# Namespace the controller and node-agents live in. CRDs are cluster
# scoped and aren't affected by this.
namespace: enforcer-system

# ---------------- Controller ----------------
controller:
  image:
    repository: ghcr.io/aryehlev/agents-enforcer-controller
    tag: ""                        # defaults to Chart.appVersion
    pullPolicy: IfNotPresent
  replicaCount: 1                  # bump to 2 once leader-election lands
  # `log` does not enforce; `grpc` pushes to node-agents.
  distributor: grpc
  cgroupTemplate: "/sys/fs/cgroup/kubepods.slice/kubepods-pod{uid}.slice"
  requeueSeconds: 30
  # HTTP port for the decision-event ingest endpoint. The node-agent
  # and LLM proxy POST here; the aggregator rolls events up into
  # AgentViolation CRs.
  events:
    port: 9092
  resources:
    limits:   { cpu: 500m,  memory: 256Mi }
    requests: { cpu: 100m,  memory: 128Mi }
  podAnnotations: {}
  nodeSelector:
    kubernetes.io/os: linux
  tolerations: []
  affinity: {}
  logLevel: info

# --------------- Node agent -----------------
nodeAgent:
  image:
    repository: ghcr.io/aryehlev/agents-enforcer-node-agent
    tag: ""
    pullPolicy: IfNotPresent
  grpc:
    port: 9091                      # controller uses this to dial each node
  resources:
    limits:   { cpu: "1",   memory: 512Mi }
    requests: { cpu: 100m,  memory: 128Mi }
  podAnnotations: {}
  # Only Linux can run eBPF; non-Linux nodes are explicitly excluded.
  nodeSelector:
    kubernetes.io/os: linux
  tolerations:
    # DaemonSet on every node, including control-plane taints.
    - operator: Exists
      effect: NoSchedule
    - operator: Exists
      effect: NoExecute
  # Required for CAP_BPF / CAP_SYS_ADMIN + access to /sys/fs/cgroup + /sys/fs/bpf.
  hostPID: true
  hostNetwork: false
  privileged: true
  # Reporter subscribes to the eBPF ringbuf and POSTs decision events
  # to the controller's /events/batch endpoint. Disable if you only
  # want local enforcement without AgentViolation CR visibility.
  reporter:
    enabled: true
    # Override to point at a custom ingest URL (e.g. behind a gateway).
    # Empty uses the in-cluster controller Service.
    controllerUrl: ""

# -------------- Metrics ---------------------
metrics:
  enabled: true
  port: 9090
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# -------------- RBAC / SA -------------------
serviceAccount:
  create: true
  annotations: {}
rbac:
  create: true

# -------------- CRDs ------------------------
# Helm 3 handles crds/ as a one-shot install. To re-apply or upgrade,
# run `kubectl apply -f deploy/crds/` directly — Helm does not manage
# CRD upgrades.
crds:
  install: true

# -------------- Admin dashboard + API -------
# Read-only HTTP API and static dashboard. Writes still go through
# kubectl → admission webhook. Enable `ingress` to expose publicly
# behind your cluster's ingress controller; by default stays inside
# the cluster for `kubectl port-forward`.
admin:
  enabled: true
  image:
    repository: ghcr.io/aryehlev/agents-enforcer-admin
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  listenPort: 8080
  # Prometheus-compatible endpoint used to populate Capability
  # spend + Overview metrics. Leave empty to serve the API without
  # live numbers; Prometheus + VictoriaMetrics + Thanos all work.
  promUrl: ""
  ingress:
    enabled: false
    className: ""
    host: agents-enforcer.example.com
    tls: []  # [{ hosts: [agents-enforcer.example.com], secretName: admin-tls }]
    annotations: {}
  resources:
    limits:   { cpu: 200m, memory: 256Mi }
    requests: { cpu: 50m,  memory: 64Mi  }
  podAnnotations: {}
  nodeSelector:
    kubernetes.io/os: linux
  tolerations: []
  affinity: {}

# -------------- LLM proxy (L7) --------------
# OpenAI-compatible gateway that enforces AgentCapability CRs —
# model allowlist, tool/function allowlist, daily USD cap.
llmProxy:
  enabled: true
  image:
    repository: ghcr.io/aryehlev/agents-enforcer-llm-proxy
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 2
  listenPort: 4180
  # Where forwarded requests land. Default is OpenAI; override for
  # LiteLLM / Portkey / an internal proxy.
  upstream: "https://api.openai.com"
  # Secret holding provider API keys. The proxy doesn't inject these
  # itself — callers pass their own Authorization/x-api-key headers
  # and the proxy forwards them. Set this if you want sidecar-style
  # injection via an outbound mutation (tracked as follow-up).
  apiKeySecret: ""
  # Directory mounted from a ConfigMap of AgentCapability YAML.
  # Operators bake bundles into `llmProxy.capabilities` for now;
  # dynamic push from the controller lands in the next phase.
  capabilities: []
  #   - apiVersion: agents.enforcer.io/v1alpha1
  #     kind: AgentCapability
  #     metadata: { name: ai-agent, namespace: prod }
  #     spec:
  #       podSelector: { matchLabels: { app: ai-agent } }
  #       allowedModels: [gpt-4o-mini]
  #       allowedTools: [search]
  #       maxDailySpendUsd: 25.0
  # Pricing table. The proxy refuses to forward any model not in
  # this table, so leaving it empty disables cost enforcement for
  # every allowed model — set `pricing: null` only if you intend
  # that. The shipped default mirrors `deploy/pricing/default.yaml`;
  # operators override per-provider contract terms.
  pricing:
    - name: claude-opus-4.7
      inputPerMillion: 15.0
      outputPerMillion: 75.0
    - name: claude-sonnet-4.6
      inputPerMillion: 3.0
      outputPerMillion: 15.0
    - name: claude-haiku-4.5
      inputPerMillion: 0.8
      outputPerMillion: 4.0
    - name: gpt-4o
      inputPerMillion: 2.5
      outputPerMillion: 10.0
    - name: gpt-4o-mini
      inputPerMillion: 0.15
      outputPerMillion: 0.6
    - name: gpt-4-turbo
      inputPerMillion: 10.0
      outputPerMillion: 30.0
  resources:
    limits:   { cpu: "1", memory: 512Mi }
    requests: { cpu: 100m, memory: 128Mi }
  podAnnotations: {}
  nodeSelector:
    kubernetes.io/os: linux
  tolerations: []
  affinity: {}

# -------------- Admission webhook -----------
webhook:
  enabled: true
  image:
    repository: ghcr.io/aryehlev/agents-enforcer-webhook
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 2                      # small but HA — webhook is on the apply path
  listenPort: 8443
  resources:
    limits:   { cpu: 500m, memory: 256Mi }
    requests: { cpu: 50m,  memory: 64Mi  }
  # failurePolicy Fail blocks apply on webhook outage. Flip to
  # Ignore for bring-up, then back to Fail once the webhook is
  # demonstrably reliable.
  failurePolicy: Fail
  timeoutSeconds: 5
  # Cert management. Set certManager.enabled=false if you're
  # already providing a Secret named `webhook.tlsSecret`.
  certManager:
    enabled: true
    issuerKind: Issuer                 # or ClusterIssuer
    issuerName: ""                     # empty -> chart creates a selfsigned Issuer
  tlsSecret: agents-enforcer-webhook-tls
  podAnnotations: {}
  nodeSelector:
    kubernetes.io/os: linux
  tolerations: []
  affinity: {}
